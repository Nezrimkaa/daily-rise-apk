name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/kivy/buildozer:latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Accept Android licenses
        run: |
          mkdir -p /github/home/.android
          echo "count=1" > /github/home/.android/repositories.cfg
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > /github/home/.android/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> /github/home/.android/licenses/android-sdk-license
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> /github/home/.android/licenses/android-sdk-license
          echo "✅ Licenses accepted"
      
      - name: Build APK
        run: |
          cd android-app
          buildozer android debug
        timeout-minutes: 90
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: daily-rise-apk
          path: android-app/bin/*.apk
          if-no-files-found: error
