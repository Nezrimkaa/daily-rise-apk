name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build APK with Docker
        uses: addnab/docker-run-action@v3
        with:
          image: ghcr.io/kivy/buildozer:latest
          options: -v ${{ github.workspace }}:/home/user/host
          run: |
            # Принимаем лицензии
            mkdir -p /home/user/.android/licenses
            echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > /home/user/.android/licenses/android-sdk-license
            echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> /home/user/.android/licenses/android-sdk-license
            echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> /home/user/.android/licenses/android-sdk-license
            
            # Устанавливаем build-tools вручную
            export ANDROID_HOME=/home/user/.buildozer/android/platform/android-sdk
            $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "build-tools;30.0.3" "platform-tools" "platforms;android-31"
            
            # Запускаем сборку
            cd /home/user/host/android-app
            buildozer android debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: daily-rise-apk
          path: android-app/bin/*.apk
          if-no-files-found: error
