name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Позволяет запускать вручную

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-11-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install buildozer cython
      
      - name: Fix buildozer.spec
        run: |
          cd android-app
          if grep -q "^# version = 0.1" buildozer.spec; then
            sed -i 's/^# version = 0.1/version = 0.1/' buildozer.spec
          fi
          if ! grep -q "^version = " buildozer.spec; then
            echo "version = 0.1" >> buildozer.spec
          fi
          cat buildozer.spec | head -10
      
      - name: Build APK
        run: |
          cd android-app
          buildozer android debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: daily-rise-apk
          path: android-app/bin/*.apk
