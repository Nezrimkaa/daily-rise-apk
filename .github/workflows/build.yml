name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev cmake libffi-dev libssl-dev libncursesw5-dev libncurses-dev
      
      - name: Install Python dependencies
        run: |
          pip install buildozer cython==0.29.36
      
      - name: Setup buildozer to use preinstalled Android SDK
        run: |
          # Используем предустановленный SDK от GitHub
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export ANDROID_HOME=/usr/local/lib/android/sdk
          
          # Создаём ссылки на buildozer
          mkdir -p ~/.buildozer/android/platform/
          ln -sf $ANDROID_SDK_ROOT ~/.buildozer/android/platform/android-sdk
          
          # Создаём лицензии
          mkdir -p $ANDROID_SDK_ROOT/licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> $ANDROID_SDK_ROOT/licenses/android-sdk-license
          
          echo "=== SDK Info ==="
          ls -la $ANDROID_SDK_ROOT/
          ls -la $ANDROID_SDK_ROOT/cmdline-tools/
          ls -la $ANDROID_SDK_ROOT/tools/bin/ 2>/dev/null || echo "tools/bin not found"
          
          # Проверяем sdkmanager
          if [ -f "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
            echo "✅ sdkmanager found in cmdline-tools/latest"
          elif [ -f "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" ]; then
            echo "✅ sdkmanager found in tools/bin"
          else
            echo "❌ sdkmanager not found"
            find $ANDROID_SDK_ROOT -name "sdkmanager" 2>/dev/null
          fi
      
      - name: Build APK
        run: |
          cd android-app
          export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/tools/bin:$PATH
          
          buildozer android debug
        timeout-minutes: 60
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-rise-apk
          path: android-app/bin/*.apk
          if-no-files-found: warn
