name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-11-jdk autoconf libtool pkg-config zlib1g-dev cmake libffi-dev libssl-dev libncursesw5-dev libncurses-dev wget curl
      
      - name: Install Python dependencies
        run: |
          pip install buildozer cython==0.29.36
      
      - name: Setup Android SDK for buildozer
        run: |
          # Создаём структуру для buildozer
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest
          
          # Скачиваем command line tools
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          
          # Копируем в структуру buildozer
          mv cmdline-tools/* ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/
          
          # Создаём лицензии
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          
          # Устанавливаем SDK компоненты через sdkmanager
          export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
          ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/.buildozer/android/platform/android-sdk "platform-tools" "platforms;android-31" "build-tools;30.0.3" "ndk;25.2.9519653"
          
          # Создаём symlink для tools
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools
          ln -s ~/.buildozer/android/platform/android-sdk/cmdline-tools ~/.buildozer/android/platform/android-sdk/tools/bin
          
          echo "SDK setup complete"
      
      - name: Build APK
        run: |
          cd android-app
          export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/tools/bin:$PATH
          buildozer android debug
        timeout-minutes: 90
      
      - name: Check build output
        run: |
          cd android-app
          echo "=== Bin directory ==="
          ls -la bin/ || echo "bin/ not found"
          find . -name "*.apk" || echo "No APK found"
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-rise-apk
          path: |
            android-app/bin/*.apk
            android-app/**/*.apk
          if-no-files-found: warn
