name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build APK with Docker
        uses: addnab/docker-run-action@v3
        with:
          image: ghcr.io/kivy/buildozer:latest
          options: -v ${{ github.workspace }}:/home/user/host
          run: |
            cd /home/user/host/android-app
            buildozer android debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: daily-rise-apk
          path: android-app/bin/*.apk
          if-no-files-found: error
