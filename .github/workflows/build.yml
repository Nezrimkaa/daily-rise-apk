name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-11-jdk autoconf libtool pkg-config zlib1g-dev cmake libffi-dev libssl-dev libncursesw5-dev libncurses-dev wget curl
      
      - name: Install Python dependencies
        run: |
          pip install buildozer cython==0.29.36
      
      - name: Pre-accept Android licenses for buildozer
        run: |
          # Создаём структуру директорий buildozer
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
          
          # Скачиваем command line tools для buildozer
          cd ~/.buildozer/android/platform/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip
          
          # Создаём файлы лицензий (это обходит интерактивное принятие)
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          
          echo "Licenses pre-accepted"
      
      - name: Setup buildozer.spec
        run: |
          cd android-app
          echo "=== Files ==="
          ls -la
          cat buildozer.spec
      
      - name: Build APK
        run: |
          cd android-app
          export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
          buildozer android debug
        timeout-minutes: 90
      
      - name: Check build output
        run: |
          cd android-app
          echo "=== Bin directory ==="
          ls -la bin/ || echo "bin/ not found"
          find . -name "*.apk" || echo "No APK found"
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-rise-apk
          path: |
            android-app/bin/*.apk
            android-app/**/*.apk
          if-no-files-found: warn
