name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-11-jdk autoconf libtool pkg-config zlib1g-dev cmake libffi-dev libssl-dev libncursesw5-dev libncurses-dev wget curl
      
      - name: Install Python dependencies
        run: |
          pip install buildozer cython==0.29.36
      
      - name: Accept Android licenses
        run: |
          mkdir -p ~/.android
          echo "count=1" > ~/.android/repositories.cfg
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          echo "y" | sdkmanager "tools" "platform-tools" "build-tools;30.0.3" "platforms;android-31" || true
      
      - name: Setup buildozer.spec
        run: |
          cd android-app
          echo "=== Files in android-app ==="
          ls -la
          echo "=== buildozer.spec ==="
          cat buildozer.spec
      
      - name: Build APK
        run: |
          cd android-app
          export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
          buildozer android debug
        timeout-minutes: 90
      
      - name: Check build output
        run: |
          cd android-app
          echo "=== Bin directory ==="
          ls -la bin/ || echo "bin/ not found"
          find . -name "*.apk" 2>/dev/null || echo "No APK found"
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-rise-apk
          path: |
            android-app/bin/*.apk
            android-app/**/*.apk
          if-no-files-found: warn
