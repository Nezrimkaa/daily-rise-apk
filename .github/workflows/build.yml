name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-11-jdk autoconf libtool pkg-config zlib1g-dev cmake libffi-dev libssl-dev libncursesw5-dev libncurses-dev wget curl
      
      - name: Install Python dependencies
        run: |
          pip install buildozer cython==0.29.36
      
      - name: Setup Android SDK
        run: |
          # Создаём директорию SDK
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          
          # Скачиваем command line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip
          
          # Принимаем все лицензии автоматически
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          
          # Устанавливаем необходимые компоненты
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platform-tools" "platforms;android-31" "build-tools;30.0.3" "ndk;25.2.9519653"
          
          echo "Android SDK installed successfully"
        env:
          ANDROID_HOME: /opt/android-sdk
      
      - name: Setup buildozer.spec
        run: |
          cd android-app
          echo "=== Files in android-app ==="
          ls -la
          echo "=== buildozer.spec ==="
          cat buildozer.spec
      
      - name: Build APK
        run: |
          cd android-app
          export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
          export ANDROID_HOME=/opt/android-sdk
          export PATH=$ANDROID_HOME/tools:$ANDROID_HOME/tools/bin:$ANDROID_HOME/platform-tools:$PATH
          buildozer android debug
        timeout-minutes: 90
      
      - name: Check build output
        run: |
          cd android-app
          echo "=== Bin directory ==="
          ls -la bin/ || echo "bin/ not found"
          find . -name "*.apk" 2>/dev/null || echo "No APK found"
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-rise-apk
          path: |
            android-app/bin/*.apk
            android-app/**/*.apk
          if-no-files-found: warn
