name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-11-jdk autoconf libtool pkg-config zlib1g-dev cmake libffi-dev libssl-dev libncursesw5-dev libncurses-dev
      
      - name: Install Python dependencies
        run: |
          pip install buildozer cython==0.29.36
          pip install kivy==2.2.1
      
      - name: Setup buildozer.spec
        run: |
          cd android-app
          # Проверяем version
          if ! grep -q "^version = " buildozer.spec; then
            sed -i '/^\[app\]/a version = 0.1' buildozer.spec
          fi
          echo "=== buildozer.spec ==="
          cat buildozer.spec | head -25
          echo "=== Files in android-app ==="
          ls -la
      
      - name: Build APK
        run: |
          cd android-app
          buildozer -v android debug
        timeout-minutes: 60
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: daily-rise-apk
          path: android-app/bin/*.apk
