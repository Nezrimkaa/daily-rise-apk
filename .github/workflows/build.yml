name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-11-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install buildozer cython
          pip install kivy==2.2.1
      
      - name: Setup buildozer.spec
        run: |
          cd android-app
          # Проверяем и добавляем version если нет
          if ! grep -q "^version = " buildozer.spec; then
            sed -i '/^\[app\]/a version = 0.1' buildozer.spec
          fi
          cat buildozer.spec | head -20
      
      - name: Build APK
        run: |
          cd android-app
          buildozer android debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: daily-rise-apk
          path: android-app/bin/*.apk
